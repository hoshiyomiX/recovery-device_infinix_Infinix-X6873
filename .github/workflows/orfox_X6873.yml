name: OrangeFox R11.3 Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'OrangeFox MANIFEST_URL'
        required: true
        default: 'https://github.com/OrangeFoxRecovery/manifest'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH (Use 12.1 for A12 devices, 11.0 for A11)'
        required: true
        default: '12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/hoshiyomiX/recovery-device_infinix_Infinix-X6873.git'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH (Must support R11.3)'
        required: true
        default: 'fox_12.1'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/infinix/Infinix-X6873'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL'
        required: false
      COMMON_TREE_BRANCH:
        description: 'COMMON_TREE_BRANCH'
        required: false
      COMMON_PATH:
        description: 'COMMON_PATH'
        required: false
      DEVICE_NAME:
        description: 'DEVICE_NAME (Output folder name)'
        required: true
        default: 'Infinix-X6873'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME (e.g., fox_X6873 or omni_X6873)'
        required: true
        default: 'fox_X6873'
      BUILD_TARGET:
        description: 'BUILD_TARGET (recovery)'
        required: true
        default: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Prepare the environment
      run: |
        sudo apt install -y --no-install-recommends \
            gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
            libc6-dev lib32ncurses-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils \
            xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev \
            libssl-dev libxml2 lzop pngcrush schedtool squashfs-tools \
            imagemagick libbz2-dev lzma libstdc++-10-dev python3 git-lfs zip unzip

    - name: Install OpenJDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11' # R11.3 is most stable on Java 11

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') || 
          startsWith(github.event.inputs.DEVICE_TREE_URL, 'git@github.com') ||
          startsWith(github.event.inputs.COMMON_TREE_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl -sS https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Setup ccache
      run: |
        mkdir -p ~/.ccache
        echo "base_dir = ${{ github.workspace }}/workspace" > ~/.ccache/ccache.conf
        echo "compression = true" >> ~/.ccache/ccache.conf
        echo "compression_level = 6" >> ~/.ccache/ccache.conf
        echo "max_size = 2G" >> ~/.ccache/ccache.conf
        ccache -M 2G
        ccache -z

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-fox-r11-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        restore-keys: |
          ccache-fox-r11-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}-
          ccache-fox-r11-${{ github.event.inputs.MANIFEST_BRANCH }}-

    - name: Initialize repo
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        git config --global user.name "excaliburXD"
        git config --global user.email "eexcalibur32@gmail.com"
        git config --global color.ui false
        repo init --depth=1 --no-repo-verify -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
      id: pwd

    - name: Repo Sync
      run: |
        repo sync -c --no-tags --no-clone-bundle -j4 --force-sync --fail-fast
      working-directory: workspace
      timeout-minutes: 60

    - name: Clone device tree
      run: |
        git clone --depth=1 ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone common tree
      if: |
        github.event.inputs.COMMON_TREE_URL != null
        && github.event.inputs.COMMON_PATH != null
        && github.event.inputs.COMMON_TREE_URL != ''
      run: |
        git clone --depth=1 ${{ github.event.inputs.COMMON_TREE_URL }} -b ${{ github.event.inputs.COMMON_TREE_BRANCH }} ./${{ github.event.inputs.COMMON_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Sync Device Dependencies
      run: |
        # OrangeFox R11.3 specific dependency handling
        # Checks for standard OrangeFox dependency files
        DEPS_FILE="${{ steps.pwd.outputs.workspace-folder }}/${{ github.event.inputs.DEVICE_PATH }}/dependencies"
        
        if [ -f "$DEPS_FILE" ]; then
            echo "Found dependencies file, processing..."
            # Use the OrangeFox tool to sync dependencies if available
            if [ -f "vendor/orangefox/tools/fox_sync.sh" ]; then
                bash vendor/orangefox/tools/fox_sync.sh $DEPS_FILE
            else
                # Fallback to manual parsing or simple sync
                repo sync -c --no-tags -j4
            fi
        else
            echo "No local dependencies file found. syncing to be safe..."
            repo sync -c --no-tags -j4
        fi
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      continue-on-error: true

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Building OrangeFox R11.3
      run: |
        export LC_ALL="C"
        
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        export CCACHE_DIR=$HOME/.ccache
        export CCACHE_EXEC=$(which ccache)
        
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng 
        make clean
        
        # 'mka' is the standard for OrangeFox R11.x
        mka recoveryimage
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      timeout-minutes: 120

    - name: Save ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-fox-r11-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}

    - name: Locate and Prepare Release Artifacts
      id: locate_artifacts
      run: |
        cd workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/
        
        # 1. Check for official OrangeFox ZIP (Standard for R11.3 releases)
        # Naming usually: OrangeFox-Unofficial-[Device]-[Version].zip
        ZIP_FILE=$(ls OrangeFox-*.zip 2>/dev/null | head -n 1)
        
        if [ -f "$ZIP_FILE" ]; then
            echo "Found OrangeFox Release ZIP: $ZIP_FILE"
            echo "file_name=$ZIP_FILE" >> $GITHUB_OUTPUT
            
            SHA256=$(sha256sum $ZIP_FILE | awk '{print $1}')
            echo "sha256=$SHA256" >> $GITHUB_OUTPUT
            echo "$SHA256  $ZIP_FILE" > $ZIP_FILE.sha256
            
            MD5=$(md5sum $ZIP_FILE | awk '{print $1}')
            echo "md5=$MD5" >> $GITHUB_OUTPUT
            echo "$MD5  $ZIP_FILE" > $ZIP_FILE.md5
        else
            # 2. Fallback to image if build didn't zip it
            echo "No ZIP found, checking for recovery.img..."
            if [ -f "recovery.img" ]; then
                IMG_NAME="recovery.img"
                echo "file_name=$IMG_NAME" >> $GITHUB_OUTPUT
                
                SHA256=$(sha256sum $IMG_NAME | awk '{print $1}')
                echo "sha256=$SHA256" >> $GITHUB_OUTPUT
                echo "$SHA256  $IMG_NAME" > $IMG_NAME.sha256
                
                MD5=$(md5sum $IMG_NAME | awk '{print $1}')
                echo "md5=$MD5" >> $GITHUB_OUTPUT
                echo "$MD5  $IMG_NAME" > $IMG_NAME.md5
            else
                echo "Error: No build output found!"
                ls -lah
                exit 1
            fi
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: | 
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ steps.locate_artifacts.outputs.file_name }}
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.sha256
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.md5
        name: OrangeFox-R11.3-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: Fox-R11.3-${{ github.run_id }}
        body: |
          ## OrangeFox Recovery R11.3 for ${{ github.event.inputs.DEVICE_NAME }}
          
          | Component | Details |
          | :--- | :--- |
          | **Maintainer** | @${{ github.actor }} |
          | **Device** | ${{ github.event.inputs.DEVICE_NAME }} |
          | **Base** | ${{ github.event.inputs.MANIFEST_BRANCH }} |
          | **Version** | R11.3 |
          
          ---
          
          ### 📝 Flash Instructions
          1. Download `${{ steps.locate_artifacts.outputs.file_name }}`.
          2. Reboot to Fastboot Mode.
          3. Flash using:
             ```bash
             # If ZIP file: Use OrangeFox App or TWRP to install the ZIP
             # If IMG file:
             fastboot flash recovery ${{ steps.locate_artifacts.outputs.file_name }}
             fastboot reboot recovery
             ```
          
          ---
          
          ### 🔒 Checksums
          
          **SHA256**
          ```
          ${{ steps.locate_artifacts.outputs.sha256 }}
          ```
          
          **MD5**
          ```
          ${{ steps.locate_artifacts.outputs.md5 }}
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
