# OrangeFox Recovery Build Workflow
# Device: Infinix GT 30 Pro (X6873)
# Compatible: OrangeFox R11.3 (fox_12.1 manifest)
# Maintainer: hoshiyomiX

name: OrangeFox X6873

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'Manifest URL'
        required: true
        default: 'https://gitlab.com/OrangeFox/Manifest.git'
        type: string
      MANIFEST_BRANCH:
        description: 'Manifest Branch (fox_12.1 = Android 12.1/13+)'
        required: true
        default: 'fox_12.1'
        type: choice
        options:
          - 'fox_12.1'
          - 'beta'
      DEVICE_TREE_URL:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/hoshiyomiX/recovery-device_infinix_Infinix-X6873.git'
        type: string
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'main'
        type: string
      DEVICE_PATH:
        description: 'Device Path'
        required: true
        default: 'device/infinix/Infinix-X6873'
        type: string
      COMMON_TREE_URL:
        description: 'Common Tree URL (optional)'
        required: false
        type: string
      COMMON_TREE_BRANCH:
        description: 'Common Tree Branch'
        required: false
        type: string
      COMMON_PATH:
        description: 'Common Path'
        required: false
        type: string
      DEVICE_NAME:
        description: 'Device Codename'
        required: true
        default: 'X6873'
        type: string
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'vendorbootimage'
        type: choice
        options:
          - 'vendorbootimage'
          - 'recoveryimage'
          - 'bootimage'
      BUILD_TYPE:
        description: 'Build Type'
        required: true
        default: 'eng'
        type: choice
        options:
          - 'eng'
          - 'user'
      CLEAN_BUILD:
        description: 'Clean Build (no ccache)'
        required: false
        default: false
        type: boolean

# Environment Variables
env:
  FOX_DEVICE_NAME: X6873
  FOX_DEVICE_MODEL: "Infinix GT 30 Pro"
  FOX_PLATFORM: mt6897
  FOX_ARCH: arm64
  FOX_BRIGHTNESS_PATH: /sys/class/leds/lcd-backlight/brightness
  FOX_MAX_BRIGHTNESS: 255

jobs:
  # ============================================================
  # PREPARE JOB - Validate inputs and prepare environment
  # ============================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.validate.outputs.should_build }}
    steps:
      - name: Validate Build
        id: validate
        run: |
          # Only allow owner to trigger builds
          if [ "${{ github.event.repository.owner.id }}" != "${{ github.event.sender.id }}" ]; then
            echo "❌ Only repository owner can trigger builds"
            echo "should_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "✅ Build authorized"
          echo "should_build=true" >> $GITHUB_OUTPUT

  # ============================================================
  # BUILD JOB - Main build process
  # ============================================================
  build:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      # --------------------------------------------------------
      # Step 1: Checkout
      # --------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # Step 2: Cleanup unnecessary files
      # --------------------------------------------------------
      - name: Cleanup Workspace
        uses: rokibhasansagar/slimhub_actions@main

      # --------------------------------------------------------
      # Step 3: Setup Build Environment
      # --------------------------------------------------------
      - name: Setup Build Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
            libc6-dev lib32ncurses-dev libx11-dev lib32z-dev libgl1-mesa-dev \
            libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev \
            liblz4-tool libncurses-dev libncurses5 libssl-dev libwxgtk3.0-gtk3-0v5 \
            libxml2 lzop pngcrush schedtool squashfs-tools imagemagick \
            libbz2-dev lzma ncurses-dev texinfo xsltproc yacc zip unzip \
            flex bison build-essential git-lfs python3 python3-pip \
            libtinfo5 libtinfo-dev openjdk-17-jdk wget curl rsync

      # --------------------------------------------------------
      # Step 4: Setup Java 17 (Required for OrangeFox R11.3)
      # --------------------------------------------------------
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure Java Environment
        run: |
          # Set JAVA_HOME for Java 17
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/temurin-17-jdk-amd64/bin" >> $GITHUB_PATH

          # Verify Java version
          echo "=== Java Version ==="
          java -version
          javac -version

      # --------------------------------------------------------
      # Step 5: Setup SSH for private repos
      # --------------------------------------------------------
      - name: Setup SSH Keys
        if: |
          startsWith(github.event.inputs.MANIFEST_URL, 'git@') ||
          startsWith(github.event.inputs.DEVICE_TREE_URL, 'git@') ||
          startsWith(github.event.inputs.COMMON_TREE_URL, 'git@')
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # --------------------------------------------------------
      # Step 6: Install Repo Tool
      # --------------------------------------------------------
      - name: Install Repo Tool
        run: |
          mkdir -p ~/bin
          curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/local/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # --------------------------------------------------------
      # Step 7: Configure Git
      # --------------------------------------------------------
      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global color.ui false
          git config --global checkout.defaultRemote origin

      # --------------------------------------------------------
      # Step 8: Setup ccache
      # --------------------------------------------------------
      - name: Setup ccache
        if: github.event.inputs.CLEAN_BUILD != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ofox-ccache-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_number }}
          restore-keys: |
            ofox-ccache-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}-
            ofox-ccache-${{ github.event.inputs.MANIFEST_BRANCH }}-

      - name: Configure ccache
        run: |
          mkdir -p ~/.ccache
          ccache -M 12G
          ccache -z

      # --------------------------------------------------------
      # Step 9: Increase Swap Space
      # --------------------------------------------------------
      - name: Configure Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 24

      # --------------------------------------------------------
      # Step 10: Initialize Repository
      # --------------------------------------------------------
      - name: Initialize Repository
        id: init
        run: |
          mkdir -p workspace
          cd workspace
          echo "workspace_path=$(pwd)" >> $GITHUB_OUTPUT

          repo init \
            --depth=1 \
            --no-repo-verify \
            -u ${{ github.event.inputs.MANIFEST_URL }} \
            -b ${{ github.event.inputs.MANIFEST_BRANCH }}

      # --------------------------------------------------------
      # Step 11: Sync Repository
      # --------------------------------------------------------
      - name: Sync Repository
        working-directory: workspace
        timeout-minutes: 120
        run: |
          # Sync with optimized settings
          sync_flags="-c --no-tags --no-clone-bundle -j$(nproc) --force-sync --optimized-fetch"

          echo "=== Starting Repo Sync ==="
          for attempt in 1 2 3; do
            echo "Sync attempt $attempt..."
            if repo sync $sync_flags; then
              echo "✅ Sync completed successfully"
              break
            fi
            if [ $attempt -eq 3 ]; then
              echo "❌ Sync failed after 3 attempts"
              exit 1
            fi
            sleep 10
          done

      # --------------------------------------------------------
      # Step 12: Clone Device Tree
      # --------------------------------------------------------
      - name: Clone Device Tree
        working-directory: workspace
        run: |
          DEVICE_PATH="${{ github.event.inputs.DEVICE_PATH }}"

          echo "=== Cloning Device Tree ==="
          git clone --depth=1 \
            ${{ github.event.inputs.DEVICE_TREE_URL }} \
            -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} \
            "$DEVICE_PATH"

          echo "=== Device Tree Contents ==="
          ls -la "$DEVICE_PATH/"

          echo "=== BoardConfig.mk ==="
          head -50 "$DEVICE_PATH/BoardConfig.mk" || true

      # --------------------------------------------------------
      # Step 13: Clone Common Tree (if specified)
      # --------------------------------------------------------
      - name: Clone Common Tree
        if: |
          github.event.inputs.COMMON_TREE_URL != '' &&
          github.event.inputs.COMMON_PATH != ''
        working-directory: workspace
        run: |
          COMMON_PATH="${{ github.event.inputs.COMMON_PATH }}"

          echo "=== Cloning Common Tree ==="
          git clone --depth=1 \
            ${{ github.event.inputs.COMMON_TREE_URL }} \
            -b ${{ github.event.inputs.COMMON_TREE_BRANCH }} \
            "$COMMON_PATH"

          echo "=== Common Tree Contents ==="
          ls -la "$COMMON_PATH/" || true

      # --------------------------------------------------------
      # Step 14: Verify Device Tree Compatibility
      # --------------------------------------------------------
      - name: Verify Device Tree
        working-directory: workspace
        run: |
          DEVICE_PATH="${{ github.event.inputs.DEVICE_PATH }}"

          echo "=== Verifying Device Tree Configuration ==="

          # Check essential files
          essential_files=(
            "BoardConfig.mk"
            "device.mk"
            "AndroidProducts.mk"
            "vendorsetup.sh"
          )

          for file in "${essential_files[@]}"; do
            if [ -f "$DEVICE_PATH/$file" ]; then
              echo "✅ $file found"
            else
              echo "⚠️ $file not found"
            fi
          done

          # Check crypto configuration
          echo ""
          echo "=== Crypto Configuration ==="
          grep -E "TW_INCLUDE_CRYPTO|TW_INCLUDE_KEYMINT|TW_USE_FSCRYPT_POLICY" \
            "$DEVICE_PATH/BoardConfig.mk" || echo "No crypto flags found"

          # Check product definition
          echo ""
          echo "=== Product Definition ==="
          cat "$DEVICE_PATH/AndroidProducts.mk"

      # --------------------------------------------------------
      # Step 15: Build OrangeFox Recovery
      # --------------------------------------------------------
      - name: Build OrangeFox Recovery
        working-directory: workspace
        timeout-minutes: 240
        run: |
          # Export build environment variables
          export ALLOW_MISSING_DEPENDENCIES=true
          export USE_CCACHE=1
          export CCACHE_DIR=$HOME/.ccache
          export CCACHE_EXEC=$(which ccache)
          export LC_ALL=C

          # OrangeFox specific variables
          export FOX_BURNER_MAINTAINERS="${{ github.actor }}"
          export FOX_RECOVERY_DEVICE_CODENAME="${{ github.event.inputs.DEVICE_NAME }}"
          export FOX_RECOVERY_DEVICE_MODEL="${{ env.FOX_DEVICE_MODEL }}"
          export FOX_RECOVERY_PLATFORM="${{ env.FOX_PLATFORM }}"

          # Build configuration
          BUILD_TARGET="${{ github.event.inputs.BUILD_TARGET }}"
          BUILD_TYPE="${{ github.event.inputs.BUILD_TYPE }}"
          DEVICE_NAME="${{ github.event.inputs.DEVICE_NAME }}"

          echo "=========================================="
          echo "  OrangeFox Recovery Build Configuration"
          echo "=========================================="
          echo "Device: $DEVICE_NAME"
          echo "Model: ${{ env.FOX_DEVICE_MODEL }}"
          echo "Platform: ${{ env.FOX_PLATFORM }}"
          echo "Build Target: $BUILD_TARGET"
          echo "Build Type: $BUILD_TYPE"
          echo "Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}"
          echo "=========================================="

          # Source build environment
          source build/envsetup.sh

          # Lunch the device
          echo ""
          echo "=== Lunching Device ==="

          LUNCH_SUCCESS=false
          for lunch_target in "twrp_${DEVICE_NAME}-${BUILD_TYPE}" \
                              "omni_${DEVICE_NAME}-${BUILD_TYPE}" \
                              "recovery_${DEVICE_NAME}-${BUILD_TYPE}"; do
            echo "Trying: lunch $lunch_target"
            if lunch "$lunch_target" 2>/dev/null; then
              LUNCH_SUCCESS=true
              echo "✅ Successfully lunched: $lunch_target"
              break
            fi
          done

          if [ "$LUNCH_SUCCESS" = false ]; then
            echo "❌ Failed to lunch any target"
            exit 1
          fi

          # Display build environment
          echo ""
          echo "=== Build Environment ==="
          echo "TARGET_PRODUCT: $TARGET_PRODUCT"
          echo "TARGET_DEVICE: $TARGET_DEVICE"
          echo "TARGET_ARCH: $TARGET_ARCH"
          echo "TARGET_BUILD_TYPE: $TARGET_BUILD_TYPE"

          # Clean build if requested
          if [ "${{ github.event.inputs.CLEAN_BUILD }}" = "true" ]; then
            echo ""
            echo "=== Performing Clean Build ==="
            make clean
            ccache -z
          fi

          # Start build
          echo ""
          echo "=== Starting Build ==="
          JOB_COUNT=$(($(nproc) - 2))
          [ $JOB_COUNT -lt 2 ] && JOB_COUNT=2

          mka "$BUILD_TARGET" -j"$JOB_COUNT" || {
            echo "Build failed, retrying with single thread..."
            mka "$BUILD_TARGET" -j1
          }

      # --------------------------------------------------------
      # Step 16: Save ccache
      # --------------------------------------------------------
      - name: Save ccache
        if: github.event.inputs.CLEAN_BUILD != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ofox-ccache-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_number }}

      # --------------------------------------------------------
      # Step 17: Prepare Artifacts
      # --------------------------------------------------------
      - name: Prepare Build Artifacts
        id: artifacts
        working-directory: workspace
        run: |
          DEVICE_NAME="${{ github.event.inputs.DEVICE_NAME }}"
          BUILD_TARGET="${{ github.event.inputs.BUILD_TARGET }}"
          OUT_DIR="out/target/product/$DEVICE_NAME"

          echo "=== Searching for Build Artifacts ==="
          echo "Output directory: $OUT_DIR"

          if [ ! -d "$OUT_DIR" ]; then
            echo "❌ Output directory not found!"
            exit 1
          fi

          # List all files in output directory
          echo ""
          echo "=== Output Directory Contents ==="
          ls -la "$OUT_DIR/" || true

          # Find image file based on build target
          case "$BUILD_TARGET" in
            vendorbootimage)
              IMAGE_FILE="vendor_boot.img"
              ;;
            recoveryimage)
              IMAGE_FILE="recovery.img"
              ;;
            bootimage)
              IMAGE_FILE="boot.img"
              ;;
            *)
              IMAGE_FILE="*.img"
              ;;
          esac

          # Locate the image file
          IMAGE_PATH=""
          if [ -f "$OUT_DIR/$IMAGE_FILE" ]; then
            IMAGE_PATH="$OUT_DIR/$IMAGE_FILE"
          else
            # Fallback: find any img file
            IMAGE_PATH=$(find "$OUT_DIR" -maxdepth 1 -name "*.img" -type f | head -n1)
          fi

          if [ -z "$IMAGE_PATH" ] || [ ! -f "$IMAGE_PATH" ]; then
            echo "❌ No image file found!"
            exit 1
          fi

          IMAGE_NAME=$(basename "$IMAGE_PATH")
          IMAGE_SIZE=$(stat -c%s "$IMAGE_PATH")
          IMAGE_SIZE_MB=$((IMAGE_SIZE / 1024 / 1024))

          echo ""
          echo "=== Image Found ==="
          echo "File: $IMAGE_NAME"
          echo "Size: ${IMAGE_SIZE_MB}MB"

          # Generate checksums
          SHA256=$(sha256sum "$IMAGE_PATH" | awk '{print $1}')
          MD5=$(md5sum "$IMAGE_PATH" | awk '{print $1}')

          # Create checksum files
          echo "$SHA256  $IMAGE_NAME" > "${IMAGE_PATH}.sha256"
          echo "$MD5  $IMAGE_NAME" > "${IMAGE_PATH}.md5"

          # Find OrangeFox ZIP (if exists)
          ZIP_PATH=$(find "$OUT_DIR" -maxdepth 2 -name "OrangeFox-*.zip" -type f | head -n1)
          ZIP_NAME=""
          if [ -n "$ZIP_PATH" ]; then
            ZIP_NAME=$(basename "$ZIP_PATH")
            echo ""
            echo "=== ZIP Found ==="
            echo "File: $ZIP_NAME"
          fi

          # Generate build info
          BUILD_DATE=$(date +"%Y%m%d")
          BUILD_TIME=$(date +"%H%M%S")

          # Set outputs
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "image_path=$IMAGE_PATH" >> $GITHUB_OUTPUT
          echo "image_size=${IMAGE_SIZE_MB}MB" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "md5=$MD5" >> $GITHUB_OUTPUT
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "zip_path=$ZIP_PATH" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

          # Move artifacts to workspace root for easier access
          cp "$IMAGE_PATH" ./
          cp "${IMAGE_PATH}.sha256" ./
          cp "${IMAGE_PATH}.md5" ./
          [ -n "$ZIP_PATH" ] && cp "$ZIP_PATH" ./

      # --------------------------------------------------------
      # Step 18: Upload to GitHub Release
      # --------------------------------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: |
            OrangeFox R11.3 - ${{ env.FOX_DEVICE_MODEL }} (${{ github.event.inputs.DEVICE_NAME }})
          tag_name: OF-R11.3-${{ github.event.inputs.DEVICE_NAME }}-${{ steps.artifacts.outputs.build_date }}
          body: |
            ## 🔥 OrangeFox Recovery for ${{ env.FOX_DEVICE_MODEL }}

            | Property | Value |
            | :--- | :--- |
            | **Device** | ${{ env.FOX_DEVICE_MODEL }} (${{ github.event.inputs.DEVICE_NAME }}) |
            | **Platform** | MediaTek ${{ env.FOX_PLATFORM }} (Dimensity 8350) |
            | **OrangeFox Version** | R11.3 (${{ github.event.inputs.MANIFEST_BRANCH }}) |
            | **Build Date** | ${{ steps.artifacts.outputs.build_date }} |
            | **Build Type** | ${{ github.event.inputs.BUILD_TYPE }} |
            | **Maintainer** | @${{ github.actor }} |
            | **Image Size** | ${{ steps.artifacts.outputs.image_size }} |

            ---

            ### 📱 Device Specifications

            | Component | Specification |
            | :--- | :--- |
            | **SoC** | MediaTek Dimensity 8350 Ultimate (4nm) |
            | **CPU** | Octa-core (1×3.35GHz + 3×3.20GHz + 4×2.20GHz) |
            | **GPU** | Mali-G615 MC6 |
            | **RAM** | 8GB / 12GB |
            | **Storage** | 256GB / 512GB UFS 4.0 |
            | **Display** | 6.78" AMOLED, 1224×2720, 144Hz |
            | **Battery** | 5500mAh |
            | **Android** | 15 (API 35) |

            ---

            ### ✅ Working Features

            - ✅ Display & Touch
            - ✅ ADB Sideload
            - ✅ Fastbootd
            - ✅ MTP
            - ✅ Decryption (FBE v2 + AIDL KeyMint V3)
            - ✅ Backup & Restore
            - ✅ Flashing (System/Vendor/Product)
            - ✅ Magisk Installation

            ### ⚠️ Known Issues

            - ❌ USB OTG
            - ❌ Vibrator

            ---

            ### 📝 Flash Instructions

            **Method 1: Fastboot (Recommended)**
            ```bash
            # Boot to fastboot mode
            adb reboot bootloader

            # Flash vendor_boot partition
            fastboot flash vendor_boot ${{ steps.artifacts.outputs.image_name }}

            # Reboot to recovery
            fastboot reboot recovery
            ```

            **Method 2: Direct Flash via Recovery**
            1. Boot to existing recovery
            2. Select "Install" → "Install Image"
            3. Choose `vendor_boot` partition
            4. Flash and reboot

            ---

            ### 🔐 Security Features

            - **Encryption**: FBE v2 (AES-256-XTS/CTS)
            - **KeyMint**: AIDL V3 (Trustonic TEE)
            - **Gatekeeper**: AIDL V1
            - **Secure Boot**: VBMeta compatible

            ---

            ### 📋 Checksums

            | Algorithm | Hash |
            | :--- | :--- |
            | **SHA256** | `${{ steps.artifacts.outputs.sha256 }}` |
            | **MD5** | `${{ steps.artifacts.outputs.md5 }}` |

            ---

            ### ⚡ Notes

            - Built with **GKI 2.0** vendor_boot format
            - Compatible with **Android 15** devices
            - Supports **Virtual A/B** OTA
            - **Trustonic TEE** enabled for secure decryption

            ---

            > **Disclaimer**: Use at your own risk. Always backup your data before flashing.

          files: |
            ${{ steps.artifacts.outputs.image_path }}
            ${{ steps.artifacts.outputs.image_path }}.sha256
            ${{ steps.artifacts.outputs.image_path }}.md5
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------
      # Step 19: Upload ZIP (if exists)
      # --------------------------------------------------------
      - name: Upload ZIP to Release
        if: steps.artifacts.outputs.zip_name != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: OF-R11.3-${{ github.event.inputs.DEVICE_NAME }}-${{ steps.artifacts.outputs.build_date }}
          files: ${{ steps.artifacts.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------
      # Step 20: Upload to Artifacts
      # --------------------------------------------------------
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-R11.3-${{ github.event.inputs.DEVICE_NAME }}-${{ steps.artifacts.outputs.build_date }}
          path: |
            ${{ steps.artifacts.outputs.image_path }}
            ${{ steps.artifacts.outputs.image_path }}.sha256
            ${{ steps.artifacts.outputs.image_path }}.md5
          retention-days: 30
          compression-level: 9

      # --------------------------------------------------------
      # Step 21: Summary
      # --------------------------------------------------------
      - name: Build Summary
        run: |
          echo ""
          echo "============================================"
          echo "  🎉 OrangeFox Build Completed Successfully!"
          echo "============================================"
          echo ""
          echo "Device: ${{ env.FOX_DEVICE_MODEL }} (${{ github.event.inputs.DEVICE_NAME }})"
          echo "Image: ${{ steps.artifacts.outputs.image_name }}"
          echo "Size: ${{ steps.artifacts.outputs.image_size }}"
          echo "Date: ${{ steps.artifacts.outputs.build_date }}"
          echo ""
          echo "SHA256: ${{ steps.artifacts.outputs.sha256 }}"
          echo ""
          echo "============================================"
