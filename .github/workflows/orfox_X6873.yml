name: OrangeFox X6873

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL'
        required: true
        default: 'https://gitlab.com/OrangeFox/manifest.git'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'fox_12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL (Ensure this is an OrangeFox tree)'
        required: true
        default: 'https://github.com/hoshiyomiX/recovery-device_infinix_Infinix-X6873.git'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'fox_12.1'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/infinix/Infinix-X6873'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL'
        required: false
      COMMON_TREE_BRANCH:
        description: 'COMMON_TREE_BRANCH'
        required: false
      COMMON_PATH:
        description: 'COMMON_PATH'
        required: false
      DEVICE_NAME:
        description: 'DEVICE_NAME (Output folder & Codename)'
        required: true
        default: 'Infinix-X6873'
      BUILD_TYPE:
        description: 'BUILD_TYPE (eng = debuggable, user = release)'
        required: true
        default: 'eng'
        type: choice
        options:
          - 'eng'
          - 'user'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Prepare the environment
      run: |
        # Removed 'upgrade' for speed
        sudo apt install -y --no-install-recommends \
            gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
            libc6-dev lib32ncurses-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils \
            xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev \
            libssl-dev libxml2 lzop pngcrush schedtool squashfs-tools \
            imagemagick libbz2-dev lzma libstdc++-10-dev python3 git-lfs zip unzip \
            flex bison build-essential

    - name: Install OpenJDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' # OrangeFox 12.1 often prefers Java 17

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@') || 
          startsWith(github.event.inputs.DEVICE_TREE_URL, 'git@') ||
          startsWith(github.event.inputs.COMMON_TREE_URL, 'git@') }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl -sS https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Setup ccache
      run: |
        mkdir -p ~/.ccache
        echo "base_dir = ${{ github.workspace }}/workspace" > ~/.ccache/ccache.conf
        echo "compression = true" >> ~/.ccache/ccache.conf
        echo "compression_level = 6" >> ~/.ccache/ccache.conf
        echo "max_size = 5G" >> ~/.ccache/ccache.conf
        ccache -M 5G
        ccache -z

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ofox-ccache-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        restore-keys: |
          ofox-ccache-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}-
          ofox-ccache-${{ github.event.inputs.MANIFEST_BRANCH }}-

    - name: Initialize repo
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        git config --global user.name "excaliburXD"
        git config --global user.email "eexcalibur32@gmail.com"
        git config --global color.ui false
        repo init --depth=1 --no-repo-verify -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
      id: pwd

    - name: Repo Sync
      run: |
        repo sync -c --no-tags --no-clone-bundle -j4 --force-sync --fail-fast
      working-directory: workspace
      timeout-minutes: 60

    - name: Clone device tree
      run: |
        git clone --depth=1 ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone common tree
      if: |
        github.event.inputs.COMMON_TREE_URL != null
        && github.event.inputs.COMMON_PATH != null
        && github.event.inputs.COMMON_TREE_URL != ''
      run: |
        git clone --depth=1 ${{ github.event.inputs.COMMON_TREE_URL }} -b ${{ github.event.inputs.COMMON_TREE_BRANCH }} ./${{ github.event.inputs.COMMON_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Building Recovery
      run: |
        # Export variables for the build script
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        export CCACHE_DIR=$HOME/.ccache
        export CCACHE_EXEC=$(which ccache)
        export FOX_BURNER_MAINTAINERS="${{ github.actor }}"
        
        # Run OrangeFox build script
        # Syntax: ./build.sh device_codename
        # The script automatically handles lunch and mka
        ./build.sh ${{ github.event.inputs.DEVICE_NAME }} -j$(($(nproc) - 2))
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      timeout-minutes: 120

    - name: Save ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ofox-ccache-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}

    - name: Calculate Hashes
      id: hashes
      run: |
        cd workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/
        
        # Find the generated OrangeFox zip (handles naming variations)
        ZIP_FILE=$(ls -t OrangeFox-*.zip | head -n1)
        
        if [ -z "$ZIP_FILE" ]; then
          echo "Error: OrangeFox zip not found!"
          ls -lah
          exit 1
        fi
        
        SHA256=$(sha256sum "$ZIP_FILE" | awk '{print $1}')
        echo "sha256=$SHA256" >> $GITHUB_OUTPUT
        echo "$SHA256  $ZIP_FILE" > "$ZIP_FILE.sha256"
        
        # Calculate MD5
        MD5=$(md5sum "$ZIP_FILE" | awk '{print $1}')
        echo "md5=$MD5" >> $GITHUB_OUTPUT
        echo "$MD5  $ZIP_FILE" > "$ZIP_FILE.md5"
        
        echo "file_name=$ZIP_FILE" >> $GITHUB_OUTPUT
        echo "Built file: $ZIP_FILE"

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: | 
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ steps.hashes.outputs.file_name }}
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.sha256
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.md5
        name: OrangeFox-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: OF-${{ github.run_id }}
        body: |
          ## OrangeFox Recovery for ${{ github.event.inputs.DEVICE_NAME }}
          
          | Component | Details |
          | :--- | :--- |
          | **Maintainer** | @${{ github.actor }} |
          | **Device** | ${{ github.event.inputs.DEVICE_NAME }} |
          | **Version** | ${{ github.event.inputs.MANIFEST_BRANCH }} |
          | **Build Type** | ${{ github.event.inputs.BUILD_TYPE }} |
          
          ---
          
          ### 📝 Flash Instructions
          1. Download `${{ steps.hashes.outputs.file_name }}`.
          2. Reboot to Fastboot Mode.
          3. Flash to Active Slot (Recommended for A/B):
             ```bash
             fastboot flash boot ${{ steps.hashes.outputs.file_name }}
             ```
             OR (If your device uses recovery partition):
             ```bash
             fastboot flash recovery ${{ steps.hashes.outputs.file_name }}
             ```
          4. Reboot:
             ```bash
             fastboot reboot recovery
             ```
          
          ---
          
          ### 🔒 Checksums
          
          **SHA256**
          ```
          ${{ steps.hashes.outputs.sha256 }}
          ```
          
          **MD5**
          ```
          ${{ steps.hashes.outputs.md5 }}
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
