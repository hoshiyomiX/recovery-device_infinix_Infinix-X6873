name: X6873 OFRP

on:
  workflow_dispatch:
    inputs:
      SYNC_URL:
        description: 'SYNC_URL'
        required: true
        default: 'https://gitlab.com/OrangeFox/sync.git'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: '12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/hoshiyomiX/recovery-device_infinix_Infinix-X6873.git'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'twrp-12.1'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/infinix/Infinix-X6873'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (if no common tree, leave blank)'
        required: false
      COMMON_PATH:
        description: 'COMMON_PATH (if no common tree, leave blank)'
        required: false
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'X6873'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_X6873'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'vendorboot'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
 
    - name: Check Out
      uses: actions/checkout@v4

    # Maximize build space by removing unnecessary packages
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 4096
        swap-size-mb: 12288
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Initialize workspace
      run: |
        mkdir -p workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
      id: pwd

    # Cache apt packages to speed up dependency installation
    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-cache-${{ runner.os }}-${{ hashFiles('.github/workflows/*OFRP.yml') }}
        restore-keys: |
          apt-cache-${{ runner.os }}-

    - name: Prepare the build environment
      run: |
        sudo apt update
        DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            linux-modules-extra-$(uname -r) \
            git python3 tar aria2 ccache \
            bc bison build-essential curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
            lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev libtinfo5 \
            openjdk-11-jdk python-is-python3 wget
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh || true
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    # Use built-in Java setup instead of custom script
    - name: Setup Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    # Setup ccache for faster compilation
    - name: Setup ccache
      run: |
        echo "export USE_CCACHE=1" >> ~/.bashrc
        echo "export CCACHE_EXEC=/usr/bin/ccache" >> ~/.bashrc
        ccache -M 10G
        ccache -z

    # Cache ccache directory
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-${{ github.event.inputs.DEVICE_NAME }}-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ github.event.inputs.DEVICE_NAME }}-${{ github.event.inputs.MANIFEST_BRANCH }}-
          ccache-${{ github.event.inputs.DEVICE_NAME }}-

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') || 
          startsWith(github.event.inputs.DEVICE_TREE_URL, 'git@github.com') ||
          startsWith(github.event.inputs.COMMON_TREE_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}

    # Cache repo directory to speed up sync
    - name: Cache repo
      uses: actions/cache@v4
      with:
        path: ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/.repo
        key: repo-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ hashFiles('**/.repo/manifests/**') }}
        restore-keys: |
          repo-${{ github.event.inputs.MANIFEST_BRANCH }}-

    - name: Sync OrangeFox sources and minimal manifest
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}
        git clone --depth=1 ${{ github.event.inputs.SYNC_URL }}
        cd sync
        ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    # Clone device trees with minimal depth for faster cloning
    - name: Clone device tree
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone --depth=1 ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone common tree
      if: |
        github.event.inputs.COMMON_TREE_URL != null
        && github.event.inputs.COMMON_PATH != null
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone --depth=1 ${{ github.event.inputs.COMMON_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.COMMON_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Building recovery
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        
        # Enable ccache
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        export CCACHE_DIR=~/.ccache
        
        # Optimize build flags
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        set +e
        source build/envsetup.sh
        set -e
        
        # Use maximum CPU cores for parallel build
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng && mka adbd ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      continue-on-error: true

    # Show ccache statistics
    - name: Show ccache stats
      run: ccache -s

    - name: Check the output directory
      run: |
        echo "Checking Product Directory:"
        ls -al ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/Infinix-X6873/

    - name: Calculate Hashes
      id: hashes
      run: |
        # Navigate to the specific output folder (Infinix-X6873)
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/Infinix-X6873/
        
        # Identify the target image (usually vendor_boot.img for X6873)
        if [ -f "vendor_boot.img" ]; then
          TARGET_IMG="vendor_boot.img"
        elif [ -f "boot.img" ]; then
          TARGET_IMG="boot.img"
        elif [ -f "recovery.img" ]; then
          TARGET_IMG="recovery.img"
        else
          echo "No image found!"
          exit 1
        fi

        # Calculate SHA256
        SHA256=$(sha256sum "$TARGET_IMG" | awk '{print $1}')
        echo "sha256=$SHA256" >> $GITHUB_OUTPUT
        echo "$SHA256  $TARGET_IMG" > "$TARGET_IMG.sha256"
        
        # Calculate MD5
        MD5=$(md5sum "$TARGET_IMG" | awk '{print $1}')
        echo "md5=$MD5" >> $GITHUB_OUTPUT
        echo "$MD5  $TARGET_IMG" > "$TARGET_IMG.md5"
        
        echo "Target Image: $TARGET_IMG"
        echo "SHA256: $SHA256"
        echo "MD5: $MD5"

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: | 
          # Hardcoded path to Infinix-X6873 to match build logs
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/Infinix-X6873/*.img
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/Infinix-X6873/*.zip
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/Infinix-X6873/*.sha256
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/Infinix-X6873/*.md5
        name: ${{ github.event.inputs.DEVICE_NAME }}-OrangeFox-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          ## 🦊 OrangeFox Recovery for ${{ github.event.inputs.DEVICE_NAME }}
          
          | Component | Details |
          | :--- | :--- |
          | **Maintainer** | @${{ github.actor }} |
          | **Device** | ${{ github.event.inputs.DEVICE_NAME }} |
          | **Manifest** | ${{ github.event.inputs.MANIFEST_BRANCH }} |
          | **Build Date** | ${{ github.event.inputs.MANIFEST_BRANCH }} |
          | **Target** | vendor_boot.img |
          
          ---
          
          ### 📝 Flash Instructions
          1. Download the image file (usually `vendor_boot.img`).
          2. Reboot your device to **Fastboot Mode**.
          3. Flash the image using the following command:
             ```bash
             fastboot flash vendor_boot vendor_boot.img
             fastboot reboot recovery
             ```
          
          ---
          
          ### 🔒 Checksums
          Click the **Copy** button on the top-right of the box to copy the hash.
          
          **SHA256**
          ```
          ${{ steps.hashes.outputs.sha256 }}
          ```
          
          **MD5**
          ```
          ${{ steps.hashes.outputs.md5 }}
          ```
          
          *Built with optimizations: ccache, parallel compilation*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
