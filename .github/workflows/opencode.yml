name: opencode

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write
  workflows: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git identity
        run: |
          git config --global user.name "OpenCode Agent"
          git config --global user.email "opencode-agent[bot]@users.noreply.github.com"

      - name: Setup Git HTTPS credential with GITHUB_TOKEN
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/glm-4.7-free
          use_github_token: true
          agent: default 
