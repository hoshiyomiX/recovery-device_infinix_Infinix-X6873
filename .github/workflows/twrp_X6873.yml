name: TWRP X6873

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL (if want to use SSH keys, use git@github.com:XXXXX)'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'twrp-12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/hoshiyomiX/recovery-device_infinix_Infinix-X6873.git'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'twrp-12.1'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/infinix/Infinix-X6873'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (if no common tree, leave blank)'
        required: false
      COMMON_PATH:
        description: 'COMMON_PATH (if no common tree, leave blank)'
        required: false
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'X6873'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_X6873'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'vendorboot'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:

    - name: Display Run Parameters
      run: |
        echo "::group::User Environment Variables"
        echo "Manifest URL: ${{ github.event.inputs.MANIFEST_URL }}"
        echo "Manifest Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Tree URL: ${{ github.event.inputs.DEVICE_TREE_URL }}"
        echo "Device Tree Branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
        echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
        echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
        echo "Makefile Name: ${{ github.event.inputs.MAKEFILE_NAME }}"
        echo "Build Target: ${{ github.event.inputs.BUILD_TARGET }}.img"
        echo "::endgroup::"

    - name: Check Out
      uses: actions/checkout@v4

    # Maximize build space by removing unnecessary packages
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 4096
        swap-size-mb: 12288
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Initialize workspace
      run: |
        mkdir -p workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
      id: pwd

    # Cache apt packages to speed up dependency installation
    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-cache-${{ runner.os }}-twrp-${{ hashFiles('.github/workflows/*TWRP.yml') }}
        restore-keys: |
          apt-cache-${{ runner.os }}-twrp-

    - name: Prepare the build environment
      run: |
        sudo apt update
        DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            linux-modules-extra-$(uname -r) \
            gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
            libc6-dev lib32ncurses-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils \
            xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev \
            build-essential libgtk-3-dev libglu1-mesa-dev freeglut3-dev git libxml2 lzop pngcrush schedtool squashfs-tools \
            imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev libncurses6 python3 tar
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Setup Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    # Setup ccache for faster compilation
    - name: Setup ccache
      run: |
        echo "export USE_CCACHE=1" >> ~/.bashrc
        echo "export CCACHE_EXEC=/usr/bin/ccache" >> ~/.bashrc
        ccache -M 10G
        ccache -z

    # Cache ccache directory
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-${{ github.event.inputs.DEVICE_NAME }}-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ github.event.inputs.DEVICE_NAME }}-${{ github.event.inputs.MANIFEST_BRANCH }}-
          ccache-${{ github.event.inputs.DEVICE_NAME }}-

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') || 
          startsWith(github.event.inputs.DEVICE_TREE_URL, 'git@github.com') ||
          startsWith(github.event.inputs.COMMON_TREE_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize repo
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}
        git config --global user.name "excaliburXD"
        git config --global user.email "eexcalibur32@gmail.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}

    # Cache repo directory to speed up sync
    - name: Cache repo
      uses: actions/cache@v4
      with:
        path: ${{ steps.pwd.outputs.workspace-folder }}/.repo
        key: repo-${{ github.event.inputs.MANIFEST_BRANCH }}-${{ hashFiles('**/.repo/manifests/**') }}
        restore-keys: |
          repo-${{ github.event.inputs.MANIFEST_BRANCH }}-

    - name: Repo Sync
      run: |
        repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone device tree
      run: |
        git clone --depth=1 ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone common tree
      if: |
        github.event.inputs.COMMON_TREE_URL != null
        && github.event.inputs.COMMON_PATH != null
      run: |
        git clone --depth=1 ${{ github.event.inputs.COMMON_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.COMMON_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Check Build Tree
      uses: haya14busa/action-cond@v1
      id: buildtree
      with:
        cond: ${{ github.event.inputs.MANIFEST_BRANCH == 'twrp-11' || github.event.inputs.MANIFEST_BRANCH == 'twrp-12.1' }}
        if_true: twrp
        if_false: omni

    - name: Sync Device Dependencies
      run: |
        bash ${GITHUB_WORKSPACE}/scripts/convert.sh ${{ github.event.inputs.DEVICE_PATH }}/${{ steps.buildtree.outputs.value }}.dependencies
        repo sync -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      continue-on-error: true

    - name: Building recovery
      run: |
        # Clear potential conflicts
        rm -rf external/gflags
        
        # Build Flags
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        export LC_ALL=C
        
        source build/envsetup.sh
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng && make clean && make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      continue-on-error: true

    - name: Show ccache stats
      run: ccache -s

    - name: Calculate Hashes
      id: hashes
      run: |
        # Navigate to the specific output folder (Infinix-X6873)
        cd ${{ steps.pwd.outputs.workspace-folder }}/out/target/product/Infinix-X6873/
        
        # Identify the target image
        if [ -f "vendor_boot.img" ]; then
          TARGET_IMG="vendor_boot.img"
        elif [ -f "boot.img" ]; then
          TARGET_IMG="boot.img"
        elif [ -f "recovery.img" ]; then
          TARGET_IMG="recovery.img"
        else
          echo "No image found!"
          exit 1
        fi

        # Calculate SHA256
        SHA256=$(sha256sum "$TARGET_IMG" | awk '{print $1}')
        echo "sha256=$SHA256" >> $GITHUB_OUTPUT
        echo "$SHA256  $TARGET_IMG" > "$TARGET_IMG.sha256"
        
        # Calculate MD5
        MD5=$(md5sum "$TARGET_IMG" | awk '{print $1}')
        echo "md5=$MD5" >> $GITHUB_OUTPUT
        echo "$MD5  $TARGET_IMG" > "$TARGET_IMG.md5"
        
        echo "Target Image: $TARGET_IMG"
        echo "SHA256: $SHA256"
        echo "MD5: $MD5"

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: | 
          # Hardcoded path to Infinix-X6873 to match build logs
          ${{ steps.pwd.outputs.workspace-folder }}/out/target/product/Infinix-X6873/*.img
          ${{ steps.pwd.outputs.workspace-folder }}/out/target/product/Infinix-X6873/*.zip
          ${{ steps.pwd.outputs.workspace-folder }}/out/target/product/Infinix-X6873/*.sha256
          ${{ steps.pwd.outputs.workspace-folder }}/out/target/product/Infinix-X6873/*.md5
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          ## 🛠️ Recovery Image for ${{ github.event.inputs.DEVICE_NAME }}
          
          | Component | Details |
          | :--- | :--- |
          | **Maintainer** | @${{ github.actor }} |
          | **Device** | ${{ github.event.inputs.DEVICE_NAME }} |
          | **Manifest** | ${{ github.event.inputs.MANIFEST_BRANCH }} |
          | **Target** | vendor_boot.img |
          
          ---
          
          ### 📝 Flash Instructions
          1. Download `vendor_boot.img`.
          2. Reboot to Fastboot Mode.
          3. Flash the image:
             ```bash
             fastboot flash vendor_boot vendor_boot.img
             fastboot reboot
             ```
          
          ---
          
          ### 🔒 Checksums
          Click the **Copy** button on the top-right of the box to copy the hash.
          
          **SHA256**
          ```
          ${{ steps.hashes.outputs.sha256 }}
          ```
          
          **MD5**
          ```
          ${{ steps.hashes.outputs.md5 }}
          ```
          
          *Built with optimizations: ccache, apt-cache, parallel compilation*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
